<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LimpaFácil</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    .topo {
      background: linear-gradient(45deg, #833ab4, #fd1d1d);
      padding: 20px;
      text-align: center;
    }

    .topo h1 { font-size: 24px; }
    .topo p { font-size: 13px; color: #ddd; margin-top: 4px; }

    .conteudo { padding: 20px; }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #333;
    }

    .card h2 {
      font-size: 16px;
      color: #833ab4;
      margin-bottom: 12px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.2s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-selecionar {
      background: linear-gradient(45deg, #833ab4, #fd1d1d);
      color: #fff;
    }

    .btn-deletar {
      background: #fd1d1d;
      color: #fff;
      display: none;
    }

    .progresso {
      background: #333;
      border-radius: 8px;
      height: 8px;
      margin: 12px 0;
      display: none;
    }

    .progresso-barra {
      background: linear-gradient(45deg, #833ab4, #fd1d1d);
      height: 100%;
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #1c1c1c;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      border: 1px solid #333;
    }

    .stat-numero {
      font-size: 28px;
      font-weight: bold;
      color: #833ab4;
    }

    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .duplicado-item {
      background: #222;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .duplicado-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
    }

    .duplicado-info { flex: 1; }

    .duplicado-nome {
      font-size: 13px;
      color: #fff;
      margin-bottom: 4px;
    }

    .duplicado-tamanho {
      font-size: 11px;
      color: #888;
    }

    .badge-duplicado {
      background: #fd1d1d;
      color: #fff;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .vazio {
      text-align: center;
      color: #555;
      padding: 40px 20px;
      font-size: 14px;
    }

    .sucesso {
      text-align: center;
      color: #0f0;
      padding: 20px;
      font-size: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="topo">
    <h1>🧹 LimpaFácil</h1>
    <p>Encontre e remova fotos duplicadas</p>
  </div>

  <div class="conteudo">

    <div class="stats">
      <div class="stat">
        <div class="stat-numero" id="total-fotos">0</div>
        <div class="stat-label">Fotos analisadas</div>
      </div>
      <div class="stat">
        <div class="stat-numero" id="total-duplicados">0</div>
        <div class="stat-label">Duplicados</div>
      </div>
      <div class="stat">
        <div class="stat-numero" id="espaco-liberado">0MB</div>
        <div class="stat-label">A liberar</div>
      </div>
      <div class="stat">
        <div class="stat-numero" id="total-deletados">0</div>
        <div class="stat-label">Deletados</div>
      </div>
    </div>

    <div class="card">
      <h2>📁 Selecionar Fotos</h2>
      <input type="file" id="input-fotos" multiple accept="image/*" style="display:none">
      <button class="btn btn-selecionar" onclick="document.getElementById('input-fotos').click()">
        📷 Selecionar Fotos da Galeria
      </button>
      <div class="progresso" id="progresso">
        <div class="progresso-barra" id="progresso-barra"></div>
      </div>
      <p id="status" style="font-size:13px; color:#888; text-align:center;"></p>
    </div>

    <div class="card" id="card-duplicados" style="display:none">
      <h2>🔍 Duplicados Encontrados</h2>
      <div id="lista-duplicados"></div>
      <button class="btn btn-deletar" id="btn-deletar" onclick="deletarDuplicados()">
        🗑️ Deletar Todos os Duplicados
      </button>
    </div>

    <div class="sucesso" id="sucesso">
      ✅ Duplicados deletados com sucesso!
    </div>

    <div class="vazio" id="vazio">
      Selecione suas fotos para começar a análise
    </div>

  </div>
