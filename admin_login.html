<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — LeandroGram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        h1 {
            background: linear-gradient(45deg, #9b59b6, #e74c3c, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: #9b59b6; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #9b59b6, #e74c3c);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .erro { color: #e74c3c; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Painel Admin</h1>
        <p>Acesso restrito ao administrador</p>
        {% if erro %}
        <p class="erro">Perdeu Mané! Tente novamente.</p>
        {% endif %}
        <form method="post">
            <input type="password" name="senha" placeholder="Senha do admin" autofocus>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
