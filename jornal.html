<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeandroGram News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
        }
        .topo {
            text-align: center;
            border-bottom: 3px solid;
            border-image: linear-gradient(45deg, #9b59b6, #e74c3c, #e67e22) 1;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .nome-jornal {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(45deg, #9b59b6, #e74c3c, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .subtitulo {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .formulario {
            text-align: center;
            margin-bottom: 30px;
        }
        .formulario input {
            background: #1a1a1a;
            border: 1px solid #9b59b6;
            color: #fff;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-right: 10px;
            outline: none;
        }
        .formulario button {
            background: linear-gradient(45deg, #9b59b6, #e74c3c);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .formulario button:hover { transform: scale(1.05); }
        .carregando {
            display: none;
            text-align: center;
            padding: 40px;
            color: #9b59b6;
            font-size: 18px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #9b59b6;
            border-radius: 50%;
            animation: girar 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .jornal {
            max-width: 800px;
            margin: 0 auto;
            display: none;
        }
        .manchete {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(45deg, #9b59b6, #e74c3c, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid #333;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .secao {
            background: #1a1a1a;
            border: 1px solid #333;
            border-left: 4px solid #9b59b6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .secao h2 {
            background: linear-gradient(45deg, #9b59b6, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .secao p {
            color: #ccc;
            line-height: 1.6;
        }
        .btn-imprimir {
            display: block;
            margin: 20px auto;
            background: linear-gradient(45deg, #9b59b6, #e74c3c);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="topo">
        <div class="nome-jornal">📰 LeandroGram News</div>
        <div class="subtitulo">O jornal do dia em que você nasceu</div>
    </div>

    <div class="formulario">
        <input type="date" id="data">
        <button onclick="gerarJornal()">Gerar meu jornal!</button>
    </div>

    <div class="carregando" id="carregando">
        <div class="spinner"></div>
