<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornal - LeandroGram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }
        .header {
            background: #121212;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #363636;
            position: relative;
        }
        .logo {
            font-size: 32px;
            font-family: cursive;
            color: #fff;
            margin-bottom: 5px;
            animation: brilho 2s infinite alternate;
        }
        .welcome {
            color: #bb86fc;
            font-size: 18px;
            margin: 10px 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .news-area {
            background: #121212;
            border: 1px solid #363636;
            border-radius: 8px;
            padding: 25px;
            min-height: 60vh;
        }
        button {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        button:hover {
            transform: scale(1.03);
        }
        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff6666;
            text-decoration: none;
            font-weight: bold;
        }
        @keyframes brilho {
            from { text-shadow: 0 0 5px #833ab4; }
            to { text-shadow: 0 0 20px #fd1d1d, 0 0 40px #fcb045; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">LeandroGram</h1>
        <h2 class="welcome">Bem-vindo, {{ nome }}! 👋</h2>
        <p>Seu jornal personalizado do dia</p>
        <a href="/logout" class="logout">Sair</a>
    </div>

    <div class="container">
        <div class="news-area" id="jornal-content">
            <p style="text-align: center; color: #888; margin-top: 50px;">
                Clique no botão abaixo para gerar seu jornal personalizado
            </p>
        </div>

        <button onclick="gerarJornal()">📬 Gerar meu jornal!</button>
    </div>

    <script>
        function gerarJornal() {
            const content = document.getElementById('jornal-content');
            content.innerHTML = `
                <p style="text-align: center; color: #bb86fc;">
                    Gerando seu jornal personalizado...<br>
                    <small>Aguarde um momento</small>
                </p>
            `;
            // Aqui você pode integrar com sua API do Gemini depois
            setTimeout(() => {
                content.innerHTML = `
                    <h2 style="color: #fff; text-align: center;">📰 Seu Jornal Personalizado</h2>
                    <p style="margin-top: 30px; text-align: center; color: #aaa;">
                        Aqui aparecerá o conteúdo gerado pelo Gemini.<br>
                        (Vamos configurar isso em breve)
                    </p>
                `;
            }, 1500);
        }
    </script>
</body>
</html>
