<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - LeandroGram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 350px;
            background: #121212;
            border: 1px solid #363636;
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
        }
        .logo {
            font-size: 36px;
            font-family: cursive;
            color: #fff;
            margin-bottom: 6px;
            animation: brilho 2s infinite alternate;
        }
        .subtitulo {
            font-size: 12px;
            color: #8e8e8e;
            margin-bottom: 24px;
            font-style: italic;
        }
        input {
            width: 100%;
            background: #1c1c1c;
            border: 1px solid #363636;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 15px;
        }
        input:focus {
            border: 1px solid #833ab4;
            outline: none;
        }
        button {
            width: 100%;
            background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: scale(1.03);
        }
        .link {
            color: #bb86fc;
            text-decoration: none;
            margin-top: 20px;
            display: block;
        }
        #feedback {
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }
        @keyframes brilho {
            from { text-shadow: 0 0 5px #833ab4; }
            to { text-shadow: 0 0 20px #fd1d1d, 0 0 40px #fcb045; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="logo">LeandroGram</h1>
        <p class="subtitulo">Crie sua conta agora 🔥</p>

        <!-- Feedback -->
        <div id="feedback"></div>

        <form action="/registrar" method="POST">
            <input type="text" name="usuario" placeholder="Escolha um nome de usuário" required>
            <input type="text" name="nome" placeholder="Seu nome completo">
            <input type="date" name="data_nascimento">
            <input type="password" name="senha" placeholder="Crie uma senha forte" required>
            <button type="submit">Cadastrar Conta</button>
        </form>

        <p style="margin: 20px 0; color: #8e8e8e;">OU</p>
        
        <a href="/" class="link">← Já tenho conta? Fazer Login</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const feedback = document.getElementById('feedback');

        if (params.get('erro') === 'usuario_existente') {
            feedback.innerHTML = '❌ Este nome de usuário já existe. Escolha outro.';
            feedback.style.backgroundColor = '#3c1a1a';
            feedback.style.color = '#ff6666';
            feedback.style.display = 'block';
        }
    </script>
</body>
</html>
